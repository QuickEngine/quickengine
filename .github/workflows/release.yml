name: Release

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Publish CalVer release
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      RELEASE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout released commit
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_SHA }}
          fetch-depth: 0

      - name: Verify CalVer calculation
        run: node --test .github/release/next-calver.test.mjs

      - name: Resolve release tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          existing_tag="$(git tag --points-at "$RELEASE_SHA" | awk '/^[0-9]{4}\.[0-9]{1,2}\.[0-9]+$/ { print; exit }')"
          if [[ -n "$existing_tag" ]]; then
            echo "tag=$existing_tag" >> "$GITHUB_OUTPUT"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git tag --list > "$RUNNER_TEMP/quickengine-tags.txt"
          release_month="$(date -u +%Y-%m)"
          next_tag="$(node .github/release/next-calver.mjs \
            --date "$release_month" \
            --tags-file "$RUNNER_TEMP/quickengine-tags.txt")"

          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Create annotated tag
        if: steps.version.outputs.created == 'true'
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --annotate "$RELEASE_TAG" "$RELEASE_SHA" --message "QuickEngine $RELEASE_TAG"
          git push origin "refs/tags/$RELEASE_TAG"

      - name: Publish GitHub Release
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            --verify-tag \
            --target "$RELEASE_SHA" \
            --title "$RELEASE_TAG" \
            --generate-notes
