name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://quickengine:quickengine_dev_password@localhost:5435/quickengine
      REDIS_URL: redis://localhost:6381
      BETTER_AUTH_SECRET: ci-placeholder-secret-at-least-32-characters
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_QUICKENGINE_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_ADMIN_URL: http://localhost:3001
      NEXT_PUBLIC_QUICKENGINE_WEB_URL: http://localhost:3000
      NEXT_PUBLIC_QUICKENGINE_ADMIN_URL: http://localhost:3001

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
