name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    services:
      # Integration tests (currently the auth suite) run against a real Postgres.
      # The suite provisions its own `quickengine_test` database inside this
      # instance and applies the committed migrations.
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: quickengine
          POSTGRES_PASSWORD: quickengine_dev_password
          POSTGRES_DB: quickengine
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U quickengine"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://quickengine:quickengine_dev_password@localhost:5435/quickengine
      REDIS_URL: redis://localhost:6381
      BETTER_AUTH_SECRET: "00000000000000000000000000000000"
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_QUICKENGINE_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_ADMIN_URL: http://localhost:3001
      NEXT_PUBLIC_QUICKENGINE_WEB_URL: http://localhost:3000
      NEXT_PUBLIC_QUICKENGINE_ADMIN_URL: http://localhost:3001

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Persist Turborepo's task cache between runs. Without it every push recomputes
      # typecheck, test and build for all 45 tasks from cold, even when the change touched
      # two files. Turbo hashes each task's inputs, so restoring this lets it skip
      # everything that genuinely did not change.
      #
      # The key is per-commit so each run writes a fresh entry; `restore-keys` falls back to
      # the most recent previous cache, which is what actually produces the hit. This is the
      # local cache — no Turbo account, token, or external service involved.
      #
      # The cache compounds: each run saves what it restored plus what it added, and Turbo
      # never prunes. GitHub evicts least-recently-used entries at a 10GB repo limit, so this
      # self-regulates, but if CI ever slows down at the restore/save steps rather than the
      # task steps, that is the cause — delete the caches and let it rebuild.
      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Biome check
        run: pnpm check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
