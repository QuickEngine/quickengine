name: CodeQL

on:
  workflow_dispatch:

# Enable pull_request, push, and schedule triggers after GitHub Advanced Security
# is available for this private repository. Without code scanning upload support,
# CodeQL analysis completes but the workflow fails when uploading SARIF results.

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
